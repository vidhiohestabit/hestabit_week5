version: "3.9"

services:

  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    restart: always

  backend:
    build: ./server
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      retries: 5

  frontend:
    build: ./client
    restart: always

  reverse-proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  mongo_data: