events {}

http {

  upstream backend {
    server backend:3000;
  }

  upstream frontend {
    server frontend:80;
  }

  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location /api/ {
      proxy_pass http://backend/;
    }

    location / {
      proxy_pass http://frontend/;
    }
  }
}